services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./.kamal/secrets
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    environment:
      APP_ENV: development
      APP_URL: http://localhost:4200
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: antiquites
      DB_USERNAME: app_user
      DB_PASSWORD: app_password
      DB_ADMIN_USERNAME: admin_user
      DB_ADMIN_PASSWORD: admin_password
      JWT_SECRET: local-dev-secret-change-me
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD_HASH: "$$2y$$10$$78u.lpYeOywm59Ak8sfTn.kdOGVsB0/yzNFO22br3ZlOro42bEnaG"
      COMPANY_EMAIL: marcomagno007@gmail.com
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: marcomagno007@gmail.com
      SMTP_SECURE: tls
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: antiquites
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  frontend_node_modules:
  backend_vendor:
  mysql_data:
